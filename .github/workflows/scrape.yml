name: scrape

on:
  schedule:
    # 매일 09:00 KST = 00:00 UTC
    - cron: "0 0 * * *"
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: scrape
  cancel-in-progress: false

jobs:
  scrape:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"

      - name: Install dependencies
        run: npm ci

      - name: Install Playwright Chromium
        run: npx playwright install --with-deps chromium

      - name: Scrape job listings
        run: npm run scrape
        env:
          HEADLESS: "true"

      - name: Commit data/jobs.json
        id: commit
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add data/jobs.json
          if git diff --staged --quiet; then
            echo "changed=false" >> "$GITHUB_OUTPUT"
            echo "No changes in jobs.json"
          else
            git commit -m "chore: jobs.json 자동 갱신 $(date -u +%Y-%m-%d)"
            git push
            echo "changed=true" >> "$GITHUB_OUTPUT"
          fi

      - name: Trigger Claude Code Routines
        if: steps.commit.outputs.changed == 'true'
        env:
          ROUTINE_ENDPOINT: ${{ secrets.ROUTINE_ENDPOINT }}
          ROUTINE_TOKEN: ${{ secrets.ROUTINE_TOKEN }}
        run: |
          if [ -z "$ROUTINE_ENDPOINT" ] || [ -z "$ROUTINE_TOKEN" ]; then
            echo "ROUTINE_ENDPOINT/TOKEN 미설정. 분석 트리거 건너뜀."
            exit 0
          fi
          curl -fsSL -X POST "$ROUTINE_ENDPOINT" \
            -H "Authorization: Bearer $ROUTINE_TOKEN" \
            -H "Content-Type: application/json" \
            -d '{"message":"jobs.json 업데이트 완료. data/jobs.json 분석 후 사용자 맞춤 취업 전략 대시보드 docs/index.html 생성해줘"}'
