name: scrape

on:
  schedule:
    # 매일 06:00 KST = 21:00 UTC (전일). Jules가 08:00 KST에 도므로 2시간 여유.
    - cron: "0 21 * * *"
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: scrape
  cancel-in-progress: false

jobs:
  scrape:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"

      - name: Install dependencies
        run: npm ci

      - name: Install Playwright Chromium
        run: npx playwright install --with-deps chromium

      - name: Scrape job listings (lifecycle merge)
        run: npm run scrape
        env:
          HEADLESS: "true"

      - name: Enrich new jobs (detail pages)
        run: npm run enrich
        env:
          HEADLESS: "true"
        continue-on-error: true

      - name: Commit data/jobs.json
        id: commit
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add data/jobs.json
          if git diff --staged --quiet; then
            echo "changed=false" >> "$GITHUB_OUTPUT"
            echo "No changes in jobs.json"
          else
            git commit -m "chore: jobs.json 자동 갱신 $(date -u +%Y-%m-%d)"
            git push
            echo "changed=true" >> "$GITHUB_OUTPUT"
          fi

      # 분석은 Jules의 별도 cron task가 08:00 KST에 깨어 처리. 여기서 트리거하지 않음.
