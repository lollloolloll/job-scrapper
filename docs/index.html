<!doctype html>
<html lang="ko">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>구직공고 AI 분석 대시보드</title>
    <style>
      :root {
        color-scheme: dark;
        background: #0f0f0f;
        color: #f5f5f5;
        font-family: Inter, Pretendard, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      }
      body {
        margin: 0;
        min-height: 100vh;
        background: radial-gradient(circle at top, #1f1b46 0, #0f0f0f 42%);
      }
      main {
        width: min(960px, calc(100% - 32px));
        margin: 0 auto;
        padding: 56px 0;
      }
      .badge {
        display: inline-flex;
        padding: 6px 10px;
        border: 1px solid #6366f1;
        border-radius: 999px;
        color: #c7d2fe;
        background: rgba(99, 102, 241, 0.14);
        font-size: 13px;
      }
      h1 {
        font-size: clamp(32px, 6vw, 56px);
        line-height: 1.05;
        margin: 18px 0;
        letter-spacing: -0.04em;
      }
      p {
        color: #cbd5e1;
        line-height: 1.7;
      }
      .card {
        margin-top: 32px;
        border: 1px solid rgba(148, 163, 184, 0.18);
        border-radius: 24px;
        background: rgba(15, 23, 42, 0.74);
        padding: 24px;
        box-shadow: 0 24px 80px rgba(0, 0, 0, 0.35);
      }
      code {
        color: #a5b4fc;
      }
    </style>
  </head>
  <body>
    <main>
      <span class="badge">job-scraper 초기 페이지</span>
      <h1>구직공고 AI 분석 대시보드</h1>
      <p>
        아직 스크래핑/AI 분석 결과가 생성되지 않았습니다. GitHub Actions와 Claude Code Routines가 설정되면
        <code>data/jobs.json</code>을 분석해 이 파일을 자동으로 갱신합니다.
      </p>
      <section class="card">
        <h2>사용자 맞춤 분석 기준</h2>
        <p>
          Next.js/React/TypeScript, 소상상점, 쌍청문 예약·대여 시스템, 웹에이전시/MVP 경험,
          AI-native workflow를 기준으로 공고 적합도를 점수화합니다.
        </p>
      </section>
    </main>
  </body>
</html>
